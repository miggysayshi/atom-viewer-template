<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ORB Strategy — Opening Range Breakout</title>
<script src="https://unpkg.com/lightweight-charts@5.0.8/dist/lightweight-charts.standalone.production.js"></script>
<script src="das-overlay.js"></script>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1e2530;        /* blue-gray card/chart surface — makes B/W candles pop */
    --surface2: #2a3340;       /* slightly lighter blue-gray for inputs */
    --border: #333;
    --text: #e8e8e8;
    --muted: #888;
    --green: #0f8f61;
    --green-bright: #22c55e;
    --red: #c94a35;
    --red-bright: #ef4444;
    --orange: #ff682c;
    --blue: #3b82f6;
    --yellow: #eab308;
    /* Marker palette — buy=cyan, sell=bright red. Used by both DAS overlay
       fills and the card accent borders so execution direction reads at a
       glance even before zooming into the chart. */
    --buy: #00bfff;
    --sell: #ff4444;
    --radius: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* ── Resolution + indicator toggle row ──────────────────────── */
  /* Distinct from .controls — sits as a SECOND row below the run controls.
     Visual language reuses the orange accent so the user recognizes these
     as a sibling of the controls bar (not a modal). Compact button group
     — each chip is just a label, no icon. Active chip gets the same orange
     pill treatment as the BG swatches for visual consistency. */
  .ribbon {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    position: sticky;
    top: 49px;            /* sits right under the .controls bar */
    z-index: 99;
  }
  .ribbon-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ribbon-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  /* Toggle chip — same shape as .bg-swatch but rectangular to fit text. */
  .ribbon-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    font-family: inherit;
  }
  .ribbon-chip:hover:not(:disabled) {
    color: var(--text);
    border-color: #555;
  }
  .ribbon-chip.active {
    background: rgba(255,104,44,0.18);
    color: #ff9a73;
    border-color: var(--orange);
  }
  .ribbon-chip:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .indicator-period {
    width: 112px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 6px;
    border-radius: 4px;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
  }
  .indicator-period:focus {
    outline: none;
    border-color: var(--orange);
  }

  /* ── Controls bar ─────────────────────────────────────────── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .controls h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .controls h1 .accent { color: var(--orange); }
  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ctrl-group label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  input[type="text"], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, select:focus { border-color: var(--orange); }
  input[type="text"] { width: 80px; text-transform: uppercase; }
  .run-btn {
    background: var(--orange);
    color: #fff;
    border: none;
    padding: 7px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: inherit;
  }
  .run-btn:hover { opacity: 0.85; }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── BG color swatch toggle ───────────────────────────────── */
  .bg-toggle {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .bg-swatch {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    transition: border-color 0.15s, transform 0.1s;
  }
  .bg-swatch:hover { border-color: #888; }
  .bg-swatch:active { transform: scale(0.92); }
  /* Orange ring marks the active swatch — same hue as the Run button so
     the selection cue reuses an accent the user already recognizes. */
  .bg-swatch.active { border-color: var(--orange); }

  /* ── Summary bar ──────────────────────────────────────────── */
  .summary-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .stat .value {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .stat .value.pos { color: var(--green-bright); }
  .stat .value.neg { color: var(--red-bright); }

  /* ── Gallery grid ─────────────────────────────────────────── */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
    padding: 20px;
    max-width: 1800px;
    margin: 0 auto;
  }
  /* Hide the TradingView attribution link injected by lightweight-charts
     v5. The link is rendered with id="tv-attr-logo" inside each chart
     wrap. We hide it across all charts so the gallery is clean. */
  #tv-attr-logo { display: none !important; }
  a[href*="tradingview.com"] { display: none !important; }
  .card {
    background: var(--card-bg, #161a14);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #555; }
  /* Use the new marker palette (cyan/red) for win/loss accent borders so the
     card color cues match the on-chart execution triangles. P&L badges in the
     card head still use green/red since that's universal for profit/loss. */
  .card.win { border-left: 3px solid var(--buy); }
  .card.loss { border-left: 3px solid var(--sell); }
  /* Top strip: single horizontal row, left-to-right order is
     ticker → direction pill → date → pnl-block. All items share one
     baseline (vertically centered via align-items: center). The pnl-block
     uses margin-left: auto so it pins to the right edge of the card
     regardless of how wide the left group grows. */
  .card-head {
    padding: 12px 14px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    justify-content: flex-start;
    border-bottom: 1px solid var(--border);
  }
  /* Left group: ticker | direction | pnl-block, all on a single row.
     Date is pushed to the right edge via margin-left:auto below. */
  .card-head .head-left {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
    flex: 0 1 auto;
  }
  /* Ticker: large bare text per the locked top-strip spec. No pill, no
     background, no border, no border-radius. Dominates the top-left so the
     trade identifies at a glance. font-family keeps it visually distinct
     from the rest of the card (which uses Inter sans). */
  .card-head .ticker-symbol {
    font-size: 30px;
    font-weight: 700;
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }
  .card-head .day-date {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    margin-left: auto;        /* pin date to right edge of card-head */
    white-space: nowrap;
  }
  .pnl-block {
    display: flex;
    align-items: center;
    gap: 4px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    min-width: 0;
    flex-shrink: 1;
  }
  .pnl-block .pnl-dollars {
    font-size: 15px;
    font-weight: 700;
  }
  .pnl-block .pnl-rratio {
    font-size: 11px;
    font-weight: 600;
    opacity: 0.85;
  }
  .pnl-block.pos .pnl-dollars,
  .pnl-block.pos .pnl-rratio { color: var(--green-bright); }
  .pnl-block.neg .pnl-dollars,
  .pnl-block.neg .pnl-rratio { color: var(--red-bright); }
  /* Direction pill — kept as a pill per the brief (only the TICKER loses
     its pill). Colors locked to the spec palette: LONG=cyan/teal,
     SHORT=red. font-size lifted from 10px → 14px to match the spec. */
  .dir-badge {
    font-size: 14px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.2;
  }
  .dir-badge.long  { background: rgba(0,191,255,0.18); color: var(--buy); }
  .dir-badge.short { background: rgba(255,68,68,0.18); color: var(--sell); }
  .chart-wrap {
    position: relative;
    height: 200px;
  }
  .card-details {
    padding: 0 14px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    font-size: 11px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s ease, padding 0.2s ease;
  }
  .card-details.expanded {
    padding: 8px 14px 12px;
    max-height: 600px;
  }
  /* Expand toggle: small chevron on the right of the card-head. Subtle
     by default (dim color, no background). Rotates 180° when the strip
     is expanded. */
  .expand-toggle {
    background: none;
    border: 0;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    margin-left: 8px;
    transition: transform 0.2s ease, color 0.2s ease;
  }
  .expand-toggle:hover { color: var(--text); }
  .expand-toggle[aria-expanded="true"] { transform: rotate(180deg); }
  .detail-cell {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .detail-cell .dl { color: var(--muted); font-size: 10px; text-transform: uppercase; }
  .detail-cell .dv { font-weight: 600; }
  /* "wide" cells (Reason for Entry/Exit) span 2 columns on the 4-col grid so
     the longer text doesn't wrap awkwardly. Slightly tighter padding than
     the other cells because the inner line still wraps; font-size stays the
     same so label/value weights match the rest of the strip. */
  .detail-cell.detail-cell-wide { grid-column: span 2; }
  .detail-cell.detail-cell-wide .dv { line-height: 1.35; }

  /* Old .ticker-badge removed per the locked top-strip spec — the ticker is
     now bare text (.ticker-symbol) with no background/border/radius. */

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,13,13,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    flex-direction: column;
    gap: 16px;
  }
  .loading-overlay.active { display: flex; }
  .loading-overlay .big-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-overlay p { color: var(--muted); font-size: 14px; }

  .error-msg {
    padding: 40px 20px;
    text-align: center;
    color: var(--red-bright);
    font-size: 14px;
  }
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="controls">
  <h1><span class="accent">Atoms</span> Visual Check</h1>
  <div class="ctrl-group">
    <label>Symbol</label>
    <input type="text" id="symbol" value="SPY" maxlength="8" />
  </div>
  <div class="ctrl-group">
    <label>Strategy</label>
    <select id="strategy">
      <option value="orb">ORB breakout</option>
      <option value="streak_reversal">3-candle reversal</option>
      <option value="premarket_breakout">Premarket breakout</option>
      <option value="premarket_reentry">Premarket re-entry</option>
      <option value="fashionably_late">SMB Fashionably Late VWAP/EMA</option>
      <option value="larry_williams_3bar">Larry Williams 3-bar reversal</option>
      <option value="engulfing">Engulfing close</option>
      <option value="fvg_retrace">Fair value gap 50% retrace</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Direction</label>
    <select id="directionMode">
      <option value="both" selected>Both</option>
      <option value="long">Long only</option>
      <option value="short">Short only</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Stop</label>
    <select id="stopMode">
      <option value="current_extrema" selected>Current HOD/LOD</option>
      <option value="one_bar">1-bar stop</option>
      <option value="fvg_suggested">FVG candle stop</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Strategy TF</label>
    <select id="strategyTf">
      <option value="1m">1m</option>
      <option value="2m">2m</option>
      <option value="3m">3m</option>
      <option value="5m">5m</option>
      <option value="10m">10m</option>
      <option value="15m" selected>15m</option>
      <option value="30m">30m</option>
      <option value="1h">1hr</option>
      <option value="4h">4hr</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Risk TF</label>
    <select id="riskTf" title="For 1-bar stops: lower-timeframe risk bar while signal/target stays on Strategy TF">
      <option value="same" selected>Same</option>
      <option value="1m">1m</option>
      <option value="2m">2m</option>
      <option value="3m">3m</option>
      <option value="5m">5m</option>
      <option value="10m">10m</option>
      <option value="15m">15m</option>
      <option value="30m">30m</option>
      <option value="1h">1hr</option>
      <option value="4h">4hr</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Re-entries</label>
    <select id="reentries" title="Max additional entries after a trade exits on the same day">
      <option value="0" selected>None</option>
      <option value="1">1 re-entry</option>
      <option value="2">2 re-entries</option>
      <option value="3">3 re-entries</option>
      <option value="5">5 re-entries</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>OR Window</label>
    <select id="orMinutes">
      <option value="5">5 min</option>
      <option value="15" selected>15 min</option>
      <option value="30">30 min</option>
      <option value="60">60 min</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Interval</label>
    <select id="interval">
      <option value="1m">1m</option>
      <option value="2m">2m</option>
      <option value="3m">3m</option>
      <option value="5m" selected>5m</option>
      <option value="10m">10m</option>
      <option value="15m">15m</option>
      <option value="30m">30m</option>
      <option value="1h">1h</option>
      <option value="4h">4h</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Days</label>
    <select id="days">
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="20" selected>20</option>
      <option value="30">30</option>
      <option value="40">40</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>BG</label>
    <div class="bg-toggle" id="bgToggle">
      <button class="bg-swatch active" data-bg="#1a2018" title="Olive green" style="background:#1a2018"></button>
      <button class="bg-swatch" data-bg="#0d2128" title="Dark teal" style="background:#0d2128"></button>
      <button class="bg-swatch" data-bg="#0e0e10" title="Charcoal" style="background:#0e0e10"></button>
      <button class="bg-swatch" data-bg="#1f1d1a" title="Warm gray" style="background:#1f1d1a"></button>
    </div>
  </div>
  <button class="run-btn" id="runBtn" onclick="runORB()">
    Run Backtest
  </button>
  <div class="spinner" id="spinner"></div>
</div>

<!-- Resolution + indicator toggle row. Sits BELOW the controls bar and is
     sticky under it so the user can flip resolution / indicators while
     scrolling through the gallery. -->
<div class="ribbon" id="ribbon">
  <div class="ribbon-group">
    <span class="ribbon-label">Resolution</span>
    <button class="ribbon-chip" data-resolution="1m" id="res-1m">1m</button>
    <button class="ribbon-chip" data-resolution="2m" id="res-2m">2m</button>
    <button class="ribbon-chip" data-resolution="3m" id="res-3m">3m</button>
    <button class="ribbon-chip active" data-resolution="5m" id="res-5m">5m</button>
    <button class="ribbon-chip" data-resolution="10m" id="res-10m">10m</button>
    <button class="ribbon-chip" data-resolution="15m" id="res-15m">15m</button>
    <button class="ribbon-chip" data-resolution="30m" id="res-30m">30m</button>
    <button class="ribbon-chip" data-resolution="1h" id="res-1h">1h</button>
    <button class="ribbon-chip" data-resolution="4h" id="res-4h">4h</button>
  </div>
  <div class="ribbon-group">
    <span class="ribbon-label">Indicators</span>
    <button class="ribbon-chip" data-indicator="sma" id="ind-sma">SMA 20</button>
    <input class="indicator-period" id="sma-period" data-period="sma" type="text" value="20" title="SMA periods, comma-separated" placeholder="10, 20, 30">
    <button class="ribbon-chip" data-indicator="ema" id="ind-ema">EMA 20</button>
    <input class="indicator-period" id="ema-period" data-period="ema" type="text" value="20" title="EMA periods, comma-separated" placeholder="10, 20, 30">
    <button class="ribbon-chip" data-indicator="vwap" id="ind-vwap">VWAP</button>
  </div>
</div>

<div class="summary-bar" id="summaryBar" style="display:none;">
  <div class="stat">
    <span class="label">Trades</span>
    <span class="value" id="sTrades">—</span>
  </div>
  <div class="stat">
    <span class="label">Win Rate</span>
    <span class="value" id="sWinRate">—</span>
  </div>
  <div class="stat">
    <span class="label">Total P&L</span>
    <span class="value" id="sTotalPnl">—</span>
  </div>
  <div class="stat">
    <span class="label">Avg P&L</span>
    <span class="value" id="sAvgPnl">—</span>
  </div>
  <div class="stat">
    <span class="label">Total R</span>
    <span class="value" id="sTotalR">—</span>
  </div>
  <div class="stat">
    <span class="label">Long / Short</span>
    <span class="value" id="sLongShort">—</span>
  </div>
  <div class="stat">
    <span class="label">Avg Win</span>
    <span class="value pos" id="sAvgWin">—</span>
  </div>
  <div class="stat">
    <span class="label">Avg Loss</span>
    <span class="value neg" id="sAvgLoss">—</span>
  </div>
  <div class="stat">
    <span class="label">Best / Worst</span>
    <span class="value" id="sBestWorst">—</span>
  </div>
  <div class="stat">
    <span class="label">Avg Risk</span>
    <span class="value" id="sAvgRisk">—</span>
  </div>
  <div class="stat">
    <span class="label">Skipped Days</span>
    <span class="value" id="sSkipped">—</span>
  </div>
</div>

<div class="gallery" id="gallery">
  <div class="empty-state">Click <strong>Run Backtest</strong> to generate strategy visual-check cards.</div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="big-spinner"></div>
  <p id="loadingText">Fetching intraday data from Yahoo Finance…</p>
</div>

<script>
const { createChart, CandlestickSeries, HistogramSeries, LineSeries, LineStyle } = LightweightCharts;

// ── Controls ────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const initialParams = new URLSearchParams(location.search);
if (initialParams.has('strategy') && $('strategy')) {
  const requestedStrategy = initialParams.get('strategy');
  $('strategy').value = requestedStrategy === 'three_green_red_short' ? 'streak_reversal' : requestedStrategy;
  if (requestedStrategy === 'three_green_red_short' && $('directionMode') && !initialParams.has('direction')) {
    $('directionMode').value = 'short';
  }
}
if (initialParams.has('direction') && $('directionMode')) {
  $('directionMode').value = initialParams.get('direction');
}
if (initialParams.has('stop') && $('stopMode')) {
  $('stopMode').value = initialParams.get('stop');
}
if (initialParams.has('tf') && $('strategyTf')) {
  $('strategyTf').value = initialParams.get('tf');
}
if (initialParams.has('risk_tf') && $('riskTf')) {
  $('riskTf').value = initialParams.get('risk_tf');
}
if (initialParams.has('reentries') && $('reentries')) {
  $('reentries').value = initialParams.get('reentries');
}

// ── BG color theme ──────────────────────────────────────────
// Chart surface colors (one per swatch). Card frame is a slightly darker
// pair so the card is visually distinct from the chart inside it.
const BG_CHART = {
  '#1a2018': '#1a2018',  // olive green
  '#0d2128': '#0d2128',  // dark teal
  '#0e0e10': '#0e0e10',  // charcoal
  '#1f1d1a': '#1f1d1a',  // warm gray
};
const BG_CARD = {
  '#1a2018': '#161a14',
  '#0d2128': '#081a20',
  '#0e0e10': '#08080a',
  '#1f1d1a': '#191714',
};

// Restore last selection from localStorage so the user's choice survives a
// reload. Falls back to olive green if nothing saved or the saved value
// points at a swatch we no longer support.
let currentBgColor = '#1a2018';
try {
  const savedBg = localStorage.getItem('orb-bg');
  if (savedBg && BG_CHART[savedBg]) currentBgColor = savedBg;
} catch (_) { /* localStorage unavailable (private mode etc.) — ignore */ }

// Track every chart instance the gallery owns so the BG swatch can repaint
// them in one pass. Cleanup happens on run and on page unload via
// destroyAllOrbOverlays (charts are torn down by removing their parent cards).
const orbCharts = new Set();

function destroyAllOrbCharts() {
  for (const chart of orbCharts) {
    try { chart.remove(); } catch (_) {}
  }
  orbCharts.clear();
}

function applyAllChartsBg(color) {
  // Push the new surface color into every live chart's layout. API note:
  // layout.background must stay wrapped in {type:'solid', color:...} —
  // `chart.applyOptions({layout:{background:{color}}})` would silently
  // fail because the outer object is replaced, not merged.
  const options = { layout: { background: { type: 'solid', color } } };
  for (const chart of orbCharts) {
    try { chart.applyOptions(options); } catch (_) {}
  }
  // Repaint the card frames too. --card-bg is the variable picked up by the
  // .card CSS rule; chart-vs-card hierarchy is preserved by the curated pairs.
  document.documentElement.style.setProperty('--card-bg', BG_CARD[color] || color);
  currentBgColor = color;
}

function applyBgFromSwatch(btn) {
  const color = btn.dataset.bg;
  if (!BG_CHART[color] || color === currentBgColor) return;
  // Visual selection state first so the orange ring flips immediately even
  // if a chart redraw throws (it shouldn't, but cheap insurance).
  document.querySelectorAll('.bg-swatch').forEach((b) => b.classList.toggle('active', b === btn));
  applyAllChartsBg(color);
  try { localStorage.setItem('orb-bg', color); } catch (_) {}
}

// Sync the active-swatch visual with currentBgColor. Used on initial load
// after we've hydrated from localStorage so the orange ring lines up with
// the actual theme in use.
function syncSwatchVisual() {
  document.querySelectorAll('.bg-swatch').forEach((b) => {
    b.classList.toggle('active', b.dataset.bg === currentBgColor);
  });
}

// Track overlay instances keyed by unique trade id so same-day re-entries do not collide.
const orbOverlays = new Map();

function tradeKey(trade) {
  return trade.trade_id || `${trade.date}-${trade.entry_ts || 'entry'}`;
}

// Destroy any previously created overlays. Called before each fresh run.
function destroyAllOrbOverlays() {
  for (const [, overlay] of orbOverlays) {
    try { overlay.destroy(); } catch (_) {}
  }
  orbOverlays.clear();
  // Charts go alongside overlays because each chart is owned by a card that
  // is being torn down anyway. Without this, the next run would leak chart
  // instances and orbCharts would point at dead handles.
  destroyAllOrbCharts();
  // Also remove any popups still hanging around.
  document.querySelectorAll('.orb-exec-popup').forEach((el) => el.remove());
}

// Cleanup on page unload (avoid leaks from auto-runs during navigation).
window.addEventListener('beforeunload', destroyAllOrbOverlays);

// ── Execution popup ─────────────────────────────────────────
// Shown when user clicks an entry/exit marker. Anchored to the marker's
// pixel position, clamped to viewport edges, dismissable on Esc/outside-click.
function showExecutionPopup(execution, trade) {
  // Remove any existing popup first (only one at a time).
  const existing = document.querySelector('.orb-exec-popup');
  if (existing) existing.remove();

  const sideLabel = (execution.side || '').toUpperCase();
  const typeLabel = (execution.type || '').replace(/^./, (c) => c.toUpperCase());
  // Format Unix-second timestamp as HH:MM ET (America/New_York).
  let timeLabel = '—';
  if (typeof execution.time === 'number') {
    const d = new Date(execution.time * 1000);
    timeLabel = d.toLocaleTimeString('en-US', {
      hour: '2-digit', minute: '2-digit', hour12: false,
      timeZone: 'America/New_York',
    }) + ' ET';
  } else if (execution.time) {
    timeLabel = String(execution.time);
  }
  const priceLabel = typeof execution.price === 'number' ? execution.price.toFixed(4) : '—';
  // P&L context — for the exit marker only; entry has no settled P&L yet.
  let pnlHtml = '';
  if (execution.type === 'exit' && trade && typeof trade.pnl === 'number') {
    const tradePnl = Number.isFinite(trade.pnl_dollars) ? trade.pnl_dollars : trade.pnl;
    const rRatio = Number.isFinite(trade.r_ratio) ? trade.r_ratio : 0;
    const sign = tradePnl >= 0 ? '+' : '';
    const cls = tradePnl >= 0 ? 'pos' : 'neg';
    pnlHtml = `<div class="orb-exec-row"><span class="k">Trade P&amp;L</span><span class="v ${cls}">${sign}${tradePnl.toFixed(2)} (${rRatio >= 0 ? '+' : ''}${rRatio.toFixed(2)}R)</span></div>`;
  } else if (execution.type === 'entry' && trade && typeof trade.direction === 'string') {
    pnlHtml = `<div class="orb-exec-row"><span class="k">Direction</span><span class="v">${trade.direction.toUpperCase()}</span></div>`;
  }

  const pop = document.createElement('div');
  pop.className = 'orb-exec-popup';
  pop.innerHTML = `
    <div class="orb-exec-head">
      <span class="orb-exec-tag ${execution.side === 'buy' ? 'buy' : 'sell'}">${sideLabel}</span>
      <span class="orb-exec-type">${typeLabel}</span>
      <button class="orb-exec-close" type="button" aria-label="Close">×</button>
    </div>
    <div class="orb-exec-row"><span class="k">Time</span><span class="v">${timeLabel}</span></div>
    <div class="orb-exec-row"><span class="k">Price</span><span class="v">${priceLabel}</span></div>
    <div class="orb-exec-row"><span class="k">Size</span><span class="v">${Number.isFinite(trade?.size) ? trade.size : 100} shares</span></div>
    ${pnlHtml}
  `;
  // Inline base styles (matches dark theme from index.html).
  pop.style.cssText = 'position:fixed;background:#1e2530;border:1px solid #333;border-radius:8px;padding:0;color:#e8e8e8;font-size:12px;z-index:1000;min-width:200px;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,0.5);font-family:Inter,system-ui,sans-serif;';
  // Style child elements via a one-off <style> appended once.
  if (!document.getElementById('orb-popup-styles')) {
    const styleEl = document.createElement('style');
    styleEl.id = 'orb-popup-styles';
    styleEl.textContent = `
      .orb-exec-popup .orb-exec-head {display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #333;font-weight:700;letter-spacing:0.04em;}
      .orb-exec-popup .orb-exec-tag {padding:2px 6px;border-radius:4px;font-size:10px;}
      /* Tag colors match the on-chart execution triangles so the popup's BUY/SELL
         cue is consistent with what the user clicked. */
      .orb-exec-popup .orb-exec-tag.buy {background:rgba(0,191,255,0.2);color:#00bfff;}
      .orb-exec-popup .orb-exec-tag.sell {background:rgba(255,68,68,0.2);color:#ff4444;}
      .orb-exec-popup .orb-exec-type {flex:1;color:#c8c0b0;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;}
      .orb-exec-popup .orb-exec-close {background:transparent;border:0;color:#888;font-size:16px;line-height:1;cursor:pointer;padding:0 4px;}
      .orb-exec-popup .orb-exec-close:hover {color:#fff;}
      .orb-exec-popup .orb-exec-row {display:flex;justify-content:space-between;padding:6px 10px;gap:16px;}
      .orb-exec-popup .orb-exec-row + .orb-exec-row {border-top:1px solid #2a2a2a;}
      .orb-exec-popup .k {color:#888;font-size:11px;}
      .orb-exec-popup .v {font-weight:600;font-variant-numeric:tabular-nums;}
      .orb-exec-popup .v.pos {color:#22c55e;}
      .orb-exec-popup .v.neg {color:#ef4444;}
    `;
    document.head.appendChild(styleEl);
  }
  document.body.appendChild(pop);

  // Anchor near the clicked marker. Use the marker's bounding rect (most
  // reliable — it's in viewport coords) and clamp to viewport edges.
  let anchor;
  if (execution.getAnchorPx) {
    anchor = execution.getAnchorPx();
  } else if (execution.domEvent && execution.domEvent.currentTarget) {
    const r = execution.domEvent.currentTarget.getBoundingClientRect();
    anchor = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  } else {
    anchor = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
  }
  // Position below the marker initially; if it would overflow the bottom,
  // flip above. Then clamp horizontally with an 8px margin.
  const POP_GAP = 10;
  const margin = 8;
  const popW = pop.offsetWidth || 220;
  const popH = pop.offsetHeight || 120;
  let left = anchor.x - popW / 2;
  let top = anchor.y + POP_GAP;
  if (top + popH > window.innerHeight - margin && anchor.y - POP_GAP - popH > margin) {
    top = anchor.y - POP_GAP - popH;
  }
  left = Math.max(margin, Math.min(left, window.innerWidth - popW - margin));
  top = Math.max(margin, Math.min(top, window.innerHeight - popH - margin));
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';

  // Dismiss handlers
  function dismiss() {
    pop.remove();
    document.removeEventListener('keydown', onKey);
    document.removeEventListener('mousedown', onMouseDown, true);
  }
  function onKey(e) { if (e.key === 'Escape') dismiss(); }
  function onMouseDown(e) {
    if (pop.contains(e.target)) return;
    dismiss();
  }
  pop.querySelector('.orb-exec-close')?.addEventListener('click', dismiss);
  document.addEventListener('keydown', onKey);
  // Use capture so we don't fight stopPropagation in nested handlers.
  document.addEventListener('mousedown', onMouseDown, true);
}

// ── Resolution + indicator state ────────────────────────────
// Single source of truth for everything the ribbon toggles. Persisted to
// localStorage so the user's choices survive a reload. trades[] is also
// cached here so a resolution/indicator toggle can re-render without a
// refetch — the cards' P&L stays untouched because re-render only touches
// chart contents, not card DOM.
const RESOLUTION_SECONDS = {
  '1m': 60,
  '2m': 120,
  '3m': 180,
  '5m': 300,
  '10m': 600,
  '15m': 900,
  '30m': 1800,
  '1h': 3600,
  '4h': 14400,
  '1d': 86400,
  '1w': 604800,
};

const orbState = {
  trades: [],                 // last server response trades[]
  summary: {},                // last server response summary{}
  currentResolution: '5m',    // active resolution chip (1m/5m/15m)
  bars1mAvailable: false,     // whether server attached bars_1m to ≥1 trade
  indicators: { sma: false, ema: false, vwap: false },
  indicatorPeriods: { sma: [20], ema: [20] },
};

function sanitizeIndicatorPeriods(value, fallback = [20]) {
  const source = Array.isArray(value) ? value : String(value ?? '').split(',');
  const seen = new Set();
  const out = [];
  for (const item of source) {
    const n = Number.parseInt(String(item).trim(), 10);
    if (!Number.isFinite(n)) continue;
    const clamped = Math.max(2, Math.min(300, n));
    if (seen.has(clamped)) continue;
    seen.add(clamped);
    out.push(clamped);
  }
  return out.length ? out : fallback.slice();
}

function samePeriods(a, b) {
  if (!Array.isArray(a) || !Array.isArray(b) || a.length !== b.length) return false;
  return a.every((v, i) => v === b[i]);
}

function formatPeriods(periods) {
  return periods.join(', ');
}

// Hydrate persisted state BEFORE the first run so the ribbon reflects the
// user's last choices. Failures (private mode, quota) silently use defaults.
try {
  const saved = localStorage.getItem('orb-ribbon');
  if (saved) {
    const parsed = JSON.parse(saved);
    if (parsed && RESOLUTION_SECONDS[parsed.resolution]) {
      orbState.currentResolution = parsed.resolution;
    }
    if (parsed && parsed.indicators) {
      orbState.indicators.sma = !!parsed.indicators.sma;
      orbState.indicators.ema = !!parsed.indicators.ema;
      orbState.indicators.vwap = !!parsed.indicators.vwap;
    }
    if (parsed && parsed.indicatorPeriods) {
      orbState.indicatorPeriods.sma = sanitizeIndicatorPeriods(parsed.indicatorPeriods.sma, [20]);
      orbState.indicatorPeriods.ema = sanitizeIndicatorPeriods(parsed.indicatorPeriods.ema, [20]);
    }
  }
} catch (_) { /* ignore */ }

function persistRibbonState() {
  try {
    localStorage.setItem('orb-ribbon', JSON.stringify({
      resolution: orbState.currentResolution,
      indicators: orbState.indicators,
      indicatorPeriods: orbState.indicatorPeriods,
    }));
  } catch (_) { /* ignore */ }
}

// ── Resolution aggregator ─────────────────────────────────
// Deterministic OHLCV bucket: groups N source-seconds bars into M
// target-seconds bars. Bucket key = floor(time / targetSeconds) * targetSeconds
// so two clients given the same input produce identical output. The bucket
// `time` is the LEFT EDGE of the bucket (aligned to clock boundary).
//
// Aggregation rules (standard):
//   open   = first.open
//   high   = max(high)
//   low    = min(low)
//   close  = last.close
//   volume = sum(volume)
//   time   = floor(bar.time / target) * target (left edge)
//   et     = first bar's et string
//   session = first bar's session (best-effort — buckets typically
//             don't cross session boundaries in practice)
function aggregateBars(bars, sourceSeconds, targetSeconds) {
  if (!bars || !bars.length) return [];
  if (targetSeconds <= sourceSeconds) {
    // No aggregation needed (or counter-productive). Return shallow copies so
    // the caller can't mutate our cached source bars.
    return bars.map((b) => ({ ...b }));
  }
  const factor = targetSeconds / sourceSeconds;
  const out = [];
  let bucketKey = Math.floor(bars[0].time / targetSeconds) * targetSeconds;
  let bucket = null;
  for (let i = 0; i < bars.length; i++) {
    const b = bars[i];
    const key = Math.floor(b.time / targetSeconds) * targetSeconds;
    if (key !== bucketKey || !bucket) {
      if (bucket) out.push(bucket);
      bucketKey = key;
      bucket = {
        time: key,
        open: b.open,
        high: b.high,
        low: b.low,
        close: b.close,
        volume: b.volume || 0,
        et: b.et,
        session: b.session,
      };
    } else {
      if (b.high > bucket.high) bucket.high = b.high;
      if (b.low < bucket.low) bucket.low = b.low;
      bucket.close = b.close;
      bucket.volume += (b.volume || 0);
    }
  }
  if (bucket) out.push(bucket);
  // Round high/low/close to 4dp to match server precision. The 1m source
  // already comes clamped+server-rounded, so this only normalizes when a
  // bucket straddles tiny accumulation errors.
  for (let i = 0; i < out.length; i++) {
    out[i].high = +out[i].high.toFixed(4);
    out[i].low = +out[i].low.toFixed(4);
    out[i].close = +out[i].close.toFixed(4);
  }
  // Surface the factor for debugging — never read by other code.
  out._factor = factor;
  return out;
}

// pickBarsForResolution(trade, resolution): choose the bar array that the
// chart should display for the given resolution. Three sources, in order:
//   1. trade.bars_1m if resolution == '1m' and bars_1m present
//   2. aggregated trade.bars_1m if trade.bars_1m present (1m source → target)
//   3. trade.bars (the originally requested resolution) as a fallback
//
// Trade P&L, OR H/L, execution timestamps are strategy outputs and do NOT
// change with resolution; only the displayed bars change.
function pickBarsForResolution(trade, resolution) {
  const targetSec = RESOLUTION_SECONDS[resolution];
  if (Array.isArray(trade.bars_1m) && trade.bars_1m.length) {
    if (resolution === '1m') {
      return trade.bars_1m.slice();  // shallow copy — caller may mutate
    }
    // 5m / 15m from 1m source. Aggregator takes care of bucket alignment.
    return aggregateBars(trade.bars_1m, 60, targetSec);
  }
  // Fallback: 1m unavailable (Yahoo 422). Use trade.bars as-is and tell the
  // caller what source interval we resolved to. The chart renders correctly
  // but at the originally requested resolution. Resolution buttons must
  // show this gracefully — see updateResolutionAvailability().
  return trade.bars.slice();
}

// ── Indicator calculators ──────────────────────────────────
// All return arrays of {time, value} compatible with Lightweight Charts
// LineSeries.setData(). Skipped entries are filtered so the line series
// starts cleanly at the first valid bar.
function smaCalc(bars, period) {
  const out = [];
  let sum = 0;
  for (let i = 0; i < bars.length; i++) {
    sum += bars[i].close;
    if (i >= period) sum -= bars[i - period].close;
    if (i >= period - 1) {
      out.push({ time: bars[i].time, value: +(sum / period).toFixed(4) });
    }
  }
  return out;
}

function emaCalc(bars, period) {
  const out = [];
  if (bars.length < period) return out;
  const k = 2 / (period + 1);
  // Seed with SMA of first `period` closes so the EMA doesn't start from
  // an arbitrary first-bar value (TradingView convention).
  let seed = 0;
  for (let i = 0; i < period; i++) seed += bars[i].close;
  seed /= period;
  let prev = seed;
  for (let i = 0; i < period; i++) {
    prev = bars[i].close * k + prev * (1 - k);
  }
  out.push({ time: bars[period - 1].time, value: +prev.toFixed(4) });
  for (let i = period; i < bars.length; i++) {
    prev = bars[i].close * k + prev * (1 - k);
    out.push({ time: bars[i].time, value: +prev.toFixed(4) });
  }
  return out;
}

function vwapCalc(bars) {
  let cumPV = 0;
  let cumV = 0;
  const out = [];
  for (const b of bars) {
    const v = Number(b.volume) || 0;
    const typ = (b.high + b.low + b.close) / 3;
    cumPV += typ * v;
    cumV += v;
    if (cumV > 0) {
      out.push({ time: b.time, value: +(cumPV / cumV).toFixed(4) });
    }
  }
  return out;
}

// Indicator color palette. Picks distinct hues so multiple overlays stay
// readable; orange chosen last because it's the accent color used by the
// run button.
const INDICATOR_STYLE = {
  sma:  { colors: ['#3b82f6', '#60a5fa', '#93c5fd', '#2563eb', '#1d4ed8'], baseTitle: 'SMA' },  // blues
  ema:  { colors: ['#eab308', '#f97316', '#facc15', '#fb923c', '#ca8a04'], baseTitle: 'EMA' },  // yellows/oranges
  vwap: { color: '#ff9a73', title: 'VWAP' },    // soft orange
};

function indicatorTitle(kind, period = null) {
  if (kind === 'sma' || kind === 'ema') {
    return `${INDICATOR_STYLE[kind].baseTitle} ${period}`;
  }
  return INDICATOR_STYLE[kind].title;
}

// ── Active indicator series registry ──────────────────────
// Tracks the LineSeries handles we attached to each chart so a toggle-off
// can remove the right series without rebuilding the whole chart.
const indicatorSeriesByTrade = new Map();  // trade.date -> { sma?, ema?, vwap? }

function setIndicatorOnChart(trade, kind, on) {
  const series = indicatorSeriesByTrade.get(tradeKey(trade)) || {};
  if (on && !series[kind]) {
    const bars = pickBarsForResolution(trade, orbState.currentResolution);
    if (kind === 'sma' || kind === 'ema') {
      const style = INDICATOR_STYLE[kind];
      const handles = [];
      orbState.indicatorPeriods[kind].forEach((period, idx) => {
        const data = kind === 'sma' ? smaCalc(bars, period) : emaCalc(bars, period);
        if (!data.length) return;
        const lineSeries = trade._chart.addSeries(LineSeries, {
          color: style.colors[idx % style.colors.length],
          lineWidth: 2,
          title: indicatorTitle(kind, period),
          priceLineVisible: false,
          lastValueVisible: false,
        });
        lineSeries.setData(data);
        handles.push(lineSeries);
      });
      if (!handles.length) return;
      series[kind] = handles;
    } else if (kind === 'vwap') {
      const data = vwapCalc(bars);
      if (!data.length) return;
      const style = INDICATOR_STYLE[kind];
      const lineSeries = trade._chart.addSeries(LineSeries, {
        color: style.color,
        lineWidth: 2,
        title: indicatorTitle(kind),
        priceLineVisible: false,
        lastValueVisible: false,
      });
      lineSeries.setData(data);
      series[kind] = lineSeries;
    }
    indicatorSeriesByTrade.set(tradeKey(trade), series);
  } else if (!on && series[kind]) {
    const handles = Array.isArray(series[kind]) ? series[kind] : [series[kind]];
    for (const handle of handles) {
      try { trade._chart.removeSeries(handle); } catch (_) {}
    }
    delete series[kind];
    const key = tradeKey(trade);
    if (Object.keys(series).length === 0) indicatorSeriesByTrade.delete(key);
    else indicatorSeriesByTrade.set(key, series);
  }
}

// Apply the current indicator state to a chart (called from
// renderMiniChart for each card after the candle series is built).
function applyIndicatorsToChart(trade) {
  if (orbState.indicators.sma) setIndicatorOnChart(trade, 'sma', true);
  if (orbState.indicators.ema) setIndicatorOnChart(trade, 'ema', true);
  if (orbState.indicators.vwap) setIndicatorOnChart(trade, 'vwap', true);
}

// ── Ribbon wiring ──────────────────────────────────────────
// Update the visual state of the resolution chips: the active one gets
// .active, the disabled ones get :disabled (when bars_1m isn't available
// from the server). The 1m button is disabled if bars1mAvailable is
// false; the other chips (5m/15m) fall back to trade.bars and stay
// enabled so the user can still flip between display resolutions.
function updateResolutionAvailability() {
  const oneMinAvailable = orbState.bars1mAvailable;
  for (const res of ['1m', '5m', '15m']) {
    const btn = document.getElementById(`res-${res}`);
    if (!btn) continue;
    btn.classList.toggle('active', res === orbState.currentResolution);
    // 1m requires bars_1m data. 5m/15m always work — when bars_1m is
    // missing we just show trade.bars at its native resolution and skip
    // aggregation, which is visually identical to the requested case.
    btn.disabled = (res === '1m' && !oneMinAvailable);
  }
}

function updateIndicatorChips() {
  const smaBtn = document.getElementById('ind-sma');
  const emaBtn = document.getElementById('ind-ema');
  smaBtn.classList.toggle('active', orbState.indicators.sma);
  emaBtn.classList.toggle('active', orbState.indicators.ema);
  document.getElementById('ind-vwap').classList.toggle('active', orbState.indicators.vwap);
  smaBtn.textContent = `SMA ${formatPeriods(orbState.indicatorPeriods.sma)}`;
  emaBtn.textContent = `EMA ${formatPeriods(orbState.indicatorPeriods.ema)}`;
  document.getElementById('sma-period').value = formatPeriods(orbState.indicatorPeriods.sma);
  document.getElementById('ema-period').value = formatPeriods(orbState.indicatorPeriods.ema);
}

function setIndicatorPeriod(kind, value) {
  if (kind !== 'sma' && kind !== 'ema') return;
  const periods = sanitizeIndicatorPeriods(value, orbState.indicatorPeriods[kind]);
  if (samePeriods(periods, orbState.indicatorPeriods[kind])) {
    updateIndicatorChips();
    return;
  }
  orbState.indicatorPeriods[kind] = periods;
  updateIndicatorChips();
  persistRibbonState();
  if (orbState.indicators[kind]) renderAllCharts();
}

// Resolution button click handler: re-aggregate bars client-side, no
// network call. Trades' P&L is untouched — only chart contents change.
function setResolution(res) {
  if (!RESOLUTION_SECONDS[res] || res === orbState.currentResolution) return;
  orbState.currentResolution = res;
  updateResolutionAvailability();
  persistRibbonState();
  renderAllCharts();
}

function toggleIndicator(kind) {
  if (!INDICATOR_STYLE[kind]) return;
  orbState.indicators[kind] = !orbState.indicators[kind];
  updateIndicatorChips();
  persistRibbonState();
  // Cheapest path: walk every chart and add/remove just the one series.
  // Avoids a full chart rebuild so candle/overlay state is preserved.
  for (const trade of orbState.trades) {
    if (trade._chart) setIndicatorOnChart(trade, kind, orbState.indicators[kind]);
  }
}

// ── Chart rebuild entry point ──────────────────────────────
// Tears down every chart + overlay, then re-creates them from
// orbState.trades with the current resolution and indicators. Called on:
//   - runORB() completion (initial render)
//   - setResolution() (chip click)
// The card DOM (top strip, bottom strip, P&L) is NOT touched — only the
// chart-wrap contents are replaced. This guarantees trade numbers stay
// stable across resolution/indicator toggles.
function renderAllCharts() {
  // Wipe chart-wrap DOM nodes so each renderMiniChart starts clean. The
  // .card-details strip is preserved because it lives outside .chart-wrap.
  for (const trade of orbState.trades) {
    const wrap = document.getElementById(`chart-${tradeKey(trade)}`);
    if (!wrap) continue;
    // Drop any premarket/afterhours overlay divs left by the previous
    // chart instance — they would otherwise accumulate on rebuild.
    wrap.querySelectorAll('.pm-overlay, .post-overlay, .das-overlay').forEach((el) => el.remove());
  }
  // destroyAllOrbOverlays also calls destroyAllOrbCharts and clears
  // orbCharts — that's exactly the cleanup we want.
  destroyAllOrbOverlays();
  // Reset indicator series registry — old series references are dead.
  indicatorSeriesByTrade.clear();
  for (const trade of orbState.trades) {
    requestAnimationFrame(() => renderMiniChart(trade));
  }
}

async function runORB() {
  const symbol = $('symbol').value.trim().toUpperCase();
  const strategy = $('strategy') ? $('strategy').value : 'orb';
  const directionMode = $('directionMode') ? $('directionMode').value : 'both';
  const stopMode = $('stopMode') ? $('stopMode').value : 'current_extrema';
  const strategyTf = $('strategyTf') ? $('strategyTf').value : '15m';
  const riskTfRaw = $('riskTf') ? $('riskTf').value : 'same';
  const riskTf = riskTfRaw === 'same' ? strategyTf : riskTfRaw;
  const maxReentries = $('reentries') ? $('reentries').value : '0';
  const orMinutes = $('orMinutes').value;
  const interval = $('interval').value;
  const days = $('days').value;
  if (!symbol) return;

  // Tear down any overlays from a previous run before fetching new data so
  // the new cards don't get haunted by ghost markers if the user re-runs.
  destroyAllOrbOverlays();

  $('runBtn').disabled = true;
  $('spinner').style.display = 'inline-block';
  $('loadingOverlay').classList.add('active');
  $('loadingText').textContent = `Fetching ${symbol} intraday data from Yahoo Finance…`;

  try {
    const resp = await fetch(`/api/orb?symbol=${encodeURIComponent(symbol)}&or=${orMinutes}&days=${days}&interval=${interval}&strategy=${encodeURIComponent(strategy)}&tf=${encodeURIComponent(strategyTf)}&risk_tf=${encodeURIComponent(riskTf)}&reentries=${encodeURIComponent(maxReentries)}&direction=${encodeURIComponent(directionMode)}&stop=${encodeURIComponent(stopMode)}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      throw new Error(err.error || 'Request failed');
    }
    const data = await resp.json();
    // Cache the response so resolution/indicator toggles can re-render
    // without re-fetching. The cache is what `renderAllCharts()` reads.
    orbState.trades = data.trades || [];
    orbState.summary = data.summary || {};
    // bars_1m is "available" if at least one trade got it from the server.
    // Trade-by-trade fallback to trade.bars handles the case where some
    // days are inside Yahoo's 1m window and others aren't.
    orbState.bars1mAvailable = !!orbState.summary.bars_1m_available;
    updateResolutionAvailability();
    renderResults(data);
  } catch (e) {
    $('summaryBar').style.display = 'none';
    $('gallery').innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  } finally {
    $('runBtn').disabled = false;
    $('spinner').style.display = 'none';
    $('loadingOverlay').classList.remove('active');
  }
}

function renderResults(data) {
  const { summary, trades } = data;

  // Normalized dollar risk per trade. The share size is computed per trade so
  // each trade risks approximately the same dollar amount (|entry - stop| * size ≈
  // RISK_PER_TRADE). Hoisted above the summary block so AVG RISK can reuse it.
  const RISK_PER_TRADE = 100;

  // Summary bar
  $('summaryBar').style.display = 'flex';
  $('sTrades').textContent = `${summary.trade_days} / ${summary.total_days}`;
  $('sWinRate').textContent = `${summary.win_rate}%`;
  const totalEl = $('sTotalPnl');
  totalEl.textContent = `${summary.total_pnl >= 0 ? '+' : ''}${summary.total_pnl.toFixed(2)}`;
  totalEl.className = `value ${summary.total_pnl >= 0 ? 'pos' : 'neg'}`;
  const avgEl = $('sAvgPnl');
  avgEl.textContent = `${summary.avg_pnl >= 0 ? '+' : ''}${summary.avg_pnl.toFixed(2)}`;
  avgEl.className = `value ${summary.avg_pnl >= 0 ? 'pos' : 'neg'}`;
  const totalREl = $('sTotalR');
  const totalR = Number(summary.total_r || 0);
  totalREl.textContent = `${totalR >= 0 ? '+' : ''}${totalR.toFixed(2)}R`;
  totalREl.className = `value ${totalR >= 0 ? 'pos' : 'neg'}`;
  $('sLongShort').textContent = `${summary.long_count}L / ${summary.short_count}S`;
  $('sAvgWin').textContent = `+${summary.avg_win.toFixed(2)}`;
  $('sAvgLoss').textContent = `${summary.avg_loss.toFixed(2)}`;
  $('sBestWorst').textContent = `${summary.best_trade.toFixed(2)} / ${summary.worst_trade.toFixed(2)}`;

  // Avg Risk: by construction RISK_PER_TRADE is constant across every trade,
  // so the average is just RISK_PER_TRADE (when there is at least one trade).
  // Neutral metric — no pos/neg coloring.
  const avgRisk = trades.length ? RISK_PER_TRADE : 0;
  $('sAvgRisk').textContent = `$${avgRisk.toFixed(0)}`;

  $('sSkipped').textContent = summary.skipped_days;

  // Gallery
  if (!trades.length) {
    $('gallery').innerHTML = '<div class="empty-state">No breakout trades found in this range.</div>';
    return;
  }

  // Ticker comes from the top-level summary ("symbol" field). Default to the
  // user's input symbol if the API response omits it, so old/mock endpoints
  // still render a recognizable badge.
  const ticker = (data.summary && data.summary.symbol) || symbol;

  $('gallery').innerHTML = '';
  trades.forEach((trade) => {
    const card = document.createElement('div');
    const isWin = trade.pnl > 0;
    card.className = `card ${isWin ? 'win' : 'loss'}`;

    // ── Derived fields (computed inline per the spec) ────────────────
    // Trade duration: show as "Xh Ym" when >= 60 min, otherwise just minutes.
    // Keeps the cell compact without losing precision for short trades.
    const durationMin = Math.round((trade.exit_ts - trade.entry_ts) / 60);
    const durationLabel = durationMin >= 60
      ? `${Math.floor(durationMin / 60)}h ${durationMin % 60}m`
      : `${durationMin} min`;

    // R-multiple: P&L divided by the initial risk (|entry - stop_price|). Sign
    // and color track the trade outcome — green for winners, red for losers.
    // Guard against a zero-risk denominator (stop == entry) which would yield
    // Infinity/NaN — fall back to 0 so the cell renders something sensible.
    const riskPerShare = Number.isFinite(trade.risk_per_share)
      ? trade.risk_per_share
      : Math.abs(trade.entry - trade.stop_price);
    const rRatio = Number.isFinite(trade.r_ratio)
      ? trade.r_ratio
      : (riskPerShare > 0 ? trade.pnl / riskPerShare : 0);
    const rSign = rRatio >= 0 ? '+' : '';
    const rColor = rRatio >= 0 ? 'var(--green-bright)' : 'var(--red-bright)';

    // Per-trade share size: chosen so |entry - stop| * size ≈ RISK_PER_TRADE.
    // floor() to whole shares; if stop == entry (zero risk) we size to 0.
    const size = Number.isFinite(trade.size)
      ? trade.size
      : (riskPerShare > 0 ? Math.floor(RISK_PER_TRADE / riskPerShare) : 0);

    // Trade P&L in dollars: per-share P&L × share size. The server returns
    // `trade.pnl` as the per-share dollar move; the top strip should show
    // the actual dollar P&L of the trade after sizing. Sign matches trade.pnl
    // since `size` is always non-negative.
    const tradePnlDollars = Number.isFinite(trade.pnl_dollars)
      ? trade.pnl_dollars
      : trade.pnl * size;

    // Reason for entry: describe the breakout direction against the OR
    // boundary that was breached, plus the entry time so the cell explains
    // both WHAT the trade did and WHEN.
    const reasonForEntry = trade.reason_for_entry || (trade.direction === 'long'
      ? `ORB breakout above OR high ${trade.or_high.toFixed(2)} at ${trade.entry_time}`
      : `ORB breakdown below OR low ${trade.or_low.toFixed(2)} at ${trade.entry_time}`);

    // Reason for exit: map the API's enum to a human-readable phrase. Pass
    // through any unknown value so unexpected reasons still surface.
    let reasonForExit;
    switch (trade.exit_reason) {
      case 'target': reasonForExit = 'Hit target'; break;
      case 'stop':   reasonForExit = 'Hit stop';   break;
      case 'eod':    reasonForExit = 'End of day'; break;
      case 'market_close': reasonForExit = 'Market close exit'; break;
      default:       reasonForExit = trade.exit_reason || '—';
    }
    if (trade.reason_for_exit) reasonForExit = trade.reason_for_exit;

    const targetLabel = Number.isFinite(trade.target_price)
      ? trade.target_price.toFixed(2)
      : '—';
    const reentryLabel = trade.reentry_index > 0 ? ` · ${trade.reentry_label}` : '';

    card.innerHTML = `
      <div class="card-head">
        <div class="head-left">
          <span class="ticker-symbol">${ticker}</span>
          <span class="dir-badge ${trade.direction}">${trade.direction}</span>
          <div class="pnl-block ${isWin ? 'pos' : 'neg'}">
            <span class="pnl-dollars">${tradePnlDollars >= 0 ? '+' : ''}${tradePnlDollars.toFixed(2)}</span>
            <span class="pnl-rratio ${rRatio >= 0 ? 'pos' : 'neg'}">${rSign}${rRatio.toFixed(2)}R</span>
          </div>
        </div>
        <span class="day-date">${trade.day}${reentryLabel}</span>
        <button class="expand-toggle" aria-label="Toggle trade details" aria-expanded="false">▾</button>
      </div>
      <div class="chart-wrap" id="chart-${tradeKey(trade)}"></div>
      <div class="card-details">
        <div class="detail-cell"><span class="dl">Entry</span><span class="dv">${trade.entry.toFixed(2)}</span></div>
        <div class="detail-cell"><span class="dl">Exit</span><span class="dv">${trade.exit.toFixed(2)}</span></div>
        <div class="detail-cell"><span class="dl">Stop price</span><span class="dv" style="color:var(--red-bright)">${trade.stop_price.toFixed(2)}</span></div>
        <div class="detail-cell"><span class="dl">Size</span><span class="dv">${size} sh</span></div>
        <div class="detail-cell"><span class="dl">Trade Duration</span><span class="dv">${durationLabel}</span></div>
        <div class="detail-cell"><span class="dl">Target</span><span class="dv" style="color:var(--green-bright)">${targetLabel}</span></div>
        <div class="detail-cell"><span class="dl">R-Ratio</span><span class="dv" style="color:${rColor}">${rSign}${rRatio.toFixed(2)}R</span></div>
        <div class="detail-cell"><span class="dl">$ Risk</span><span class="dv">$${Number.isFinite(trade.risk_dollars) ? trade.risk_dollars.toFixed(2) : RISK_PER_TRADE}</span></div>
        <div class="detail-cell"><span class="dl">Entry Time</span><span class="dv">${trade.entry_time}</span></div>
        <div class="detail-cell"><span class="dl">Exit Time</span><span class="dv">${trade.exit_time}</span></div>
        <div class="detail-cell detail-cell-wide"><span class="dl">Reason for Entry</span><span class="dv">${reasonForEntry}</span></div>
        <div class="detail-cell detail-cell-wide"><span class="dl">Reason for Exit</span><span class="dv">${reasonForExit}</span></div>
      </div>
    `;
    $('gallery').appendChild(card);

    // Wire the expand/collapse toggle for the bottom detail strip. Default
    // is collapsed (locked spec). Clicking flips the .expanded class on
    // .card-details and updates aria-expanded for accessibility. Must be
    // done in the forEach (where `card` is in scope) — renderMiniChart
    // takes (trade) and doesn't see the local card element.
    const toggleBtn = card.querySelector('.expand-toggle');
    const detailsEl = card.querySelector('.card-details');
    if (toggleBtn && detailsEl) {
      toggleBtn.addEventListener('click', () => {
        const expanded = detailsEl.classList.toggle('expanded');
        toggleBtn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      });
    }
  });

  // Build all charts once after the card loop completes — avoids N
  // separate chart rebuild passes (one per card) and ensures every
  // chart-wrap has a measured size before createChart runs.
  requestAnimationFrame(renderAllCharts);
}

function renderMiniChart(trade) {
  const container = document.getElementById(`chart-${tradeKey(trade)}`);
  if (!container) return;

  // Resolve the bars to display for the current resolution. Picks from
  // trade.bars_1m (aggregated client-side) when available, otherwise falls
  // back to trade.bars. The chosen array is what gets fed to the candle +
  // volume series; indicator series use the same array via pickBarsForResolution.
  const displayBars = pickBarsForResolution(trade, orbState.currentResolution);
  // Stash the bars + chart handle on the trade object so indicator toggles
  // can reach them without a global lookup table.
  trade._displayBars = displayBars;

  // Read currentBgColor fresh at render time so a swatch click made BEFORE
  // the run finishes picks up correctly on each new card. currentBgColor is
  // a module-level let updated by applyAllChartsBg().
  const chartBgColor = currentBgColor;

  const chart = createChart(container, {
    autoSize: true,
    layout: {
      // Theme-driven surface (set via the BG swatch in the controls bar).
      // Black/white candle bodies and orange order markers read against all
      // four supported surfaces; textColor stays muted gray for axis ticks.
      background: { type: 'solid', color: chartBgColor },
      textColor: '#7a8595',
      fontSize: 10,
    },
    grid: {
      // Grid lines hidden — the price axis and time scale borders are
      // enough to anchor the eye, and the candles/OR-lines/triangles carry
      // the information. visible:false is the v5-native way to suppress
      // grid; falls back to transparent via LWC's option merge.
      vertLines: { visible: false },
      horzLines: { visible: false },
    },
    rightPriceScale: { borderColor: '#333', scaleMargins: { top: 0.08, bottom: 0.22 } },
    timeScale: {
      borderColor: '#333',
      timeVisible: true,
      secondsVisible: false,
      rightOffset: 2,
    },
    crosshair: { mode: 0 },
  });

  // Stash the chart handle on the trade so toggleIndicator can find it.
  trade._chart = chart;

  // Register so the BG swatch can repaint this chart later without having to
  // walk the DOM looking for it.
  orbCharts.add(chart);

  // Black/white candle scheme. Up=close>open (mid-gray fill, dark wick);
  // Down=close<open (off-white fill, light wick). Borders match fill so the
  // body reads as solid; wicks are slightly differentiated from the body so
  // they remain visible against both candles and the olive-green background.
  const candleSeries = chart.addSeries(CandlestickSeries, {
    upColor: '#6a6a6a', downColor: '#f0f0f0',
    borderUpColor: '#6a6a6a', borderDownColor: '#f0f0f0',
    wickUpColor: '#333333', wickDownColor: '#aaaaaa',
  });

  const candleData = displayBars.map(b => ({
    time: b.time,
    open: b.open, high: b.high, low: b.low, close: b.close,
  }));
  candleSeries.setData(candleData);

  // Volume at bottom
  const volSeries = chart.addSeries(HistogramSeries, {
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
    color: '#333',
  });
  chart.priceScale('vol').applyOptions({
    scaleMargins: { top: 0.85, bottom: 0 },
  });
  volSeries.setData(displayBars.map(b => ({
    time: b.time,
    value: b.volume,
    color: b.close >= b.open ? 'rgba(15,143,97,0.3)' : 'rgba(201,74,53,0.3)',
  })));

  // Strategy-neutral price lines. ORB provides OR H/L implicitly; other
  // atom checks can pass trade.price_lines with labels like HOD Stop.
  const priceLines = Array.isArray(trade.price_lines) && trade.price_lines.length
    ? trade.price_lines
    : [
        { price: trade.or_high, color: 'rgba(34,197,94,0.5)', title: 'OR H' },
        { price: trade.or_low, color: 'rgba(239,68,68,0.5)', title: 'OR L' },
      ];
  priceLines.forEach((line) => {
    if (!Number.isFinite(line.price)) return;
    candleSeries.createPriceLine({
      price: line.price,
      color: line.color || 'rgba(255,255,255,0.5)',
      lineWidth: 1,
      lineStyle: LineStyle.Dashed,
      axisLabelVisible: true,
      title: line.title || '',
    });
  });

  // ── Premarket translucent overlay ──────────────────────────────────
  // Draw a vertical "tissue paper" wash behind the premarket candles. Uses
  // an absolutely-positioned div inside .chart-wrap (which is position:
  // relative) so we can match the exact x-range of the premarket bar span.
  // z-index 1 keeps it BELOW the das-overlay (z-index 5) so execution
  // triangles and OR price lines stay on top of the wash.
  //
  // Premarket uses a SLIGHT WHITE wash (rgba 255,255,255,0.04) so the olive
  // background appears LIGHTER where premarket sits. The after-hours overlay
  // uses a BLACK wash (rgba 0,0,0,0.15) so the olive background appears
  // DARKER where after-hours sits. The contrast (lighter vs darker) lets
  // the eye tell the two sessions apart at a glance, even though both
  // are translucent.
  // Premarket / post filters work on whatever bars are being displayed.
  // When the user is on 5m the per-bar session tag is still preserved
  // (aggregator copies session from the first bar of each bucket), so the
  // translucent overlays still anchor to the correct session windows.
  const pmBars = displayBars.filter((b) => b.session === 'pre');
  const postBars = displayBars.filter((b) => b.session === 'post');
  let pmOverlay = container.querySelector('.pm-overlay');
  let postOverlay = container.querySelector('.post-overlay');
  if (pmBars.length >= 2 && pmOverlay == null) {
    pmOverlay = document.createElement('div');
    pmOverlay.className = 'pm-overlay';
    // Inline base styles cover layout + z-index + pointer-events. The dynamic
    // left/width are set in positionPmOverlay() so they track pan/zoom.
    pmOverlay.style.cssText =
      'position:absolute;top:0;bottom:0;background:rgba(255,255,255,0.08);' +
      'pointer-events:none;z-index:1;display:none;';
    container.appendChild(pmOverlay);
  }
  if (postBars.length >= 2 && postOverlay == null) {
    postOverlay = document.createElement('div');
    postOverlay.className = 'post-overlay';
    postOverlay.style.cssText =
      'position:absolute;top:0;bottom:0;background:rgba(0,0,0,0.30);' +
      'pointer-events:none;z-index:1;display:none;';
    container.appendChild(postOverlay);
  }

  // measureBarWidth(anchorTime): returns the on-screen pixel width of one
  // bar, derived from the time-scale distance between two adjacent bars in
  // the supplied array. Returns 0 if we can't measure (only one bar in
  // view, or the scale isn't ready yet) — the caller will then fall back
  // to bar-start coordinates, which is correct enough when the bar block
  // is fully off-screen.
  function measureBarWidth(bars) {
    if (bars.length < 2) return 0;
    const t1 = chart.timeScale().timeToCoordinate(bars[0].time);
    const t2 = chart.timeScale().timeToCoordinate(bars[1].time);
    if (t1 == null || t2 == null) return 0;
    return Math.abs(t2 - t1);
  }

  function positionSessionOverlay(overlay, bars) {
    if (!overlay || bars.length < 2) {
      if (overlay) overlay.style.display = 'none';
      return;
    }
    const firstX = chart.timeScale().timeToCoordinate(bars[0].time);
    const lastX = chart.timeScale().timeToCoordinate(bars[bars.length - 1].time);
    if (firstX == null || lastX == null) {
      // Off-screen — keep hidden until the user pans back.
      overlay.style.display = 'none';
      return;
    }
    // Right-edge snap: bar timestamps mark the LEFT edge of each bar, so
    // naively using `lastX` leaves the last bar half-uncovered. Extend by
    // one measured bar width so the overlay ends at the right edge of the
    // final bar. Falls back to a 0-width extension if we can't measure.
    const barW = measureBarWidth(bars);
    const lastBarRightX = lastX + barW;
    // Clamp width to a positive value (lastX can land before firstX if the
    // user has scrolled the chart so far that the bar block is entirely
    // to the left of the visible area).
    const width = Math.max(0, lastBarRightX - firstX);
    if (width === 0) {
      overlay.style.display = 'none';
      return;
    }
    overlay.style.display = 'block';
    overlay.style.left = `${firstX}px`;
    overlay.style.width = `${width}px`;
  }

  function positionPmOverlay() { positionSessionOverlay(pmOverlay, pmBars); }
  function positionPostOverlay() { positionSessionOverlay(postOverlay, postBars); }

  // Position now (the time scale hasn't laid out yet so first call may yield
  // null — subscribeVisibleTimeRangeChange fires on every layout pass and
  // will reposition once the scale is ready).
  positionPmOverlay();
  positionPostOverlay();
  if (pmOverlay) {
    chart.timeScale().subscribeVisibleTimeRangeChange(positionPmOverlay);
  }
  if (postOverlay) {
    chart.timeScale().subscribeVisibleTimeRangeChange(positionPostOverlay);
  }

  // Custom DAS execution overlay — replaces the built-in createSeriesMarkers.
  // T1 triangles at entry/exit, sized as 8% of visible price range, with
  // click→popup behavior wired through showExecutionPopup().
  const overlay = createDasOverlay({
    containerEl: container,
    chart,
    candleSeries,
    shape: 'T1',                              // matches index.html default
    priceLines: [],                            // OR H/L drawn above via createPriceLine
    getTrades: () => [{
      id: tradeKey(trade),
      direction: trade.direction,
      entryTime: trade.entry_ts,
      entryBarTime: trade.entry_bar_ts || trade.entry_ts,
      entryAnchor: trade.entry_anchor || 'bar_start',
      entryPrice: trade.entry,
      exitTime: trade.exit_ts,
      exitPrice: trade.exit,
      // Pass displayed bars so findBarAt can snap execution timestamps to
      // the correct loaded candles. Crucial for resolution changes — when
      // the user switches 1m → 5m, the markers must move to the bars in
      // the new (aggregated) bar list. The entry/exit timestamps
      // (trade.entry_ts / trade.exit_ts) don't change because they come
      // from the strategy pipeline, not from the displayed bars.
      bars: displayBars,
      // Carry these through for the popup's P&L context row.
      pnl: trade.pnl,
      pnl_pct: trade.pnl_pct,
    }],
    onMarkerClick: (execution, tradeObj) => showExecutionPopup(execution, tradeObj),
    sizePct: 10,
  });
  orbOverlays.set(tradeKey(trade), overlay);

  // Wire any active indicator toggles into this freshly-built chart. Done
  // after the overlay so indicator series are added on top of every other
  // series without disturbing the candle data the overlay reads from.
  applyIndicatorsToChart(trade);

  chart.timeScale().fitContent();
}

// Enter key on symbol triggers run
$('symbol').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') runORB();
});

// ── BG swatch wiring ────────────────────────────────────────
// One delegated click listener on the toggle container so we don't have to
// bind four separate handlers, and so swatches added later (e.g. by a future
// theme extension) Just Work.
$('bgToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('.bg-swatch');
  if (btn) applyBgFromSwatch(btn);
});

// ── Ribbon (resolution + indicators) wiring ─────────────────
// Two delegated click handlers (resolution group + indicator group) keep
// this O(1) regardless of how many chips are added later. Each handler
// finds the right callback by reading data-* attributes off the button.
document.querySelectorAll('.ribbon').forEach((ribbon) => {
  ribbon.addEventListener('click', (e) => {
    const resBtn = e.target.closest('[data-resolution]');
    if (resBtn && !resBtn.disabled) {
      setResolution(resBtn.dataset.resolution);
      return;
    }
    const indBtn = e.target.closest('[data-indicator]');
    if (indBtn) toggleIndicator(indBtn.dataset.indicator);
  });
});

document.querySelectorAll('[data-period]').forEach((input) => {
  input.addEventListener('change', (e) => {
    setIndicatorPeriod(e.target.dataset.period, e.target.value);
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      e.target.blur();
    }
  });
});

// Reflect the persisted state on the ribbon before the first run. This
// makes the active chip orange and disables the 1m chip if Yahoo 422'd
// during the previous run (resolved when runORB's response arrives).
updateResolutionAvailability();
updateIndicatorChips();

// Paint the initial theme BEFORE the first auto-run so the first paint
// already shows the user's saved bg (or olive green by default) instead of
// flashing the old #1e2530 surface and then snapping to the new color.
applyAllChartsBg(currentBgColor);  // sets --card-bg + currentBgColor; no charts yet, loop is a no-op
syncSwatchVisual();

// Dev-only debug hook: when ?debug=1 is in the URL, expose the live chart
// registry so external tooling (Playwright probes, devtools) can introspect
// grid visibility, layout options, etc. Stripped out in production usage by
// the absence of the query string.
if (new URLSearchParams(location.search).has('debug')) {
  window._orbCharts = orbCharts;
  console.log('[orb] debug hook active — window._orbCharts holds', orbCharts.size, 'chart(s)');
}

// Auto-run on load with defaults
runORB();
</script>
</body>
</html>
